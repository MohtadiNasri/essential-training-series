# NOTE: For learning purposes only.
# In production, never commit .env files with real secrets to Git.
# Add .env to .gitignore and provide a .env.example with placeholder values.

services:
  web:
    image: nginx:1.27-alpine
    ports:
      - '8080:80'

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    profiles:
      - backend

  adminer:
    image: adminer
    ports:
      - '8081:8080'
    profiles:
      - tools
